<h1>Sharing using Social Plugins</h1>

<p>Below are some very simple examples of how to use Social Plugins in a web page.</p>

<p><strong>Note:</strong> The Facebook Like button and Comment button were
<a href="https://developers.facebook.com/docs/plugins/like-button/">discontinued on February 10, 2026</a>.
They now render as invisible elements. The Share Button below remains available.</p>

<h3>Share Button</h3>
<fb:share-button href="http://www.fbrell.com"
                 type="button_count">
</fb:share-button>
